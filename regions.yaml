# ─────────────────────────────────────────────────────────────
# colesurfs — Region & Spot Configuration
# ─────────────────────────────────────────────────────────────
# Each top-level entry is a region (keyed by display name).
# Add a new region by appending a block — no other files need editing.
#
# Fields:
#   buoy_id        NOAA NDBC buoy station ID
#   buoy_lat/lon   Buoy coordinates (decimal degrees)
#   map_center     [lat, lon] for regional map view
#   map_zoom       Leaflet zoom level for regional view
#   spots          List of surf spots in this region
#     name           Display name
#     lat/lon        Spot coordinates
#     tide_station   NOAA CO-OPS tide station ID
#     tide_hi_offset Minutes offset from NOAA predicted high tide (Surfline correction)
#     tide_lo_offset Minutes offset from NOAA predicted low tide  (Surfline correction)
#     shore_normal   Direction the beach faces seaward (degrees true)
#     surfline_url   Surfline report URL
# ─────────────────────────────────────────────────────────────

